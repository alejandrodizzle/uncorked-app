kind = "web"
previewPath = "/"
title = "Pocket Somm"
version = "1.0.0"
id = "artifacts/uncorked"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24515

[services.development]
run = "pnpm --filter @workspace/pocket-somm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pocket-somm", "run", "build" ]
publicDir = "artifacts/uncorked/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24515"
BASE_PATH = "/"
