workflows:
  ios-app-store:
    name: Uncorked iOS App Store
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aarenas.uncorked
      vars:
        BUNDLE_ID: "com.aarenas.uncorked"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@9

      - name: Install dependencies
        script: |
          pnpm install

      - name: Build web app
        script: |
          cd artifacts/uncorked
          pnpm build

      - name: Capacitor sync
        script: |
          cd artifacts/uncorked
          npx cap sync ios

      - name: Install pods
        script: |
          cd artifacts/uncorked/ios/App
          pod install

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "artifacts/uncorked/ios/App/App.xcworkspace" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
