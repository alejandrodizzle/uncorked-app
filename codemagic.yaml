workflows:
  android-play-store:
    name: Uncorked Android Play Store
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - uncorked_keystore
      vars:
        PACKAGE_NAME: "com.aarenas.uncorked"
    scripts:
      - name: Install dependencies
        script: |
          cd artifacts/uncorked
          npm install --legacy-peer-deps
      - name: Build web app
        script: |
          cd artifacts/uncorked
          npx vite build
      - name: Capacitor sync Android
        script: |
          cd artifacts/uncorked
          npx cap sync android
      - name: Build Android release
        script: |
          cd artifacts/uncorked/android && ./gradlew bundleRelease
    artifacts:
      - artifacts/uncorked/android/app/build/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

  ios-app-store:
    name: Uncorked iOS App Store
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.aarenas.uncorked
      vars:
        BUNDLE_ID: "com.aarenas.uncorked"
        APP_STORE_APP_ID: "com.aarenas.uncorked"
        XCODE_WORKSPACE: "artifacts/uncorked/ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
    scripts:
      - name: Install dependencies
        script: |
          cd artifacts/uncorked
          npm install --legacy-peer-deps
      - name: Build web app
        script: |
          cd artifacts/uncorked
          npx vite build
      - name: Capacitor sync
        script: |
          cd artifacts/uncorked
          npx cap sync ios
      - name: Set build number
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-build-number \
            --app-id $APP_STORE_APP_ID \
            --pre-release-version 1.0.1 \
            2>/dev/null || echo 0) + 1))
          echo "Using build number: $BUILD_NUMBER"
          cd artifacts/uncorked/ios/App
          agvtool new-version -all $BUILD_NUMBER
      - name: Install pods
        script: |
          cd artifacts/uncorked/ios/App && pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace artifacts/uncorked/ios/App/App.xcworkspace \
            --scheme App \
            --export-options-plist artifacts/uncorked/export_options.plist \
            --config Release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
